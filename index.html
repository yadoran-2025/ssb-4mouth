<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사구동성 경제활동 게임!</title>
    <link rel="stylesheet" href="https://yadoran-2025.github.io/booong-design-system/releases/v2.1.0/booong.css">
    <style>
        /* ── 전역 리셋 ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--neutral-100);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* ── 16:9 슬라이드 컨테이너 ── */
        #slide-container {
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background: var(--color-surface);
            box-shadow: var(--shadow-xl);
            border-radius: var(--radius-2xl);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4vw;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* ── 타이머 바 ── */
        #timer-bar-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 10px;
            background: var(--neutral-200);
            display: none;
            border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
            overflow: hidden;
        }

        #timer-bar {
            height: 100%; width: 100%;
            background: var(--color-primary);
            transform-origin: left;
        }

        .run-timer {
            animation-name: shrinkTimer;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
        }

        @keyframes shrinkTimer {
            0%   { width: 100%; background: var(--color-success); }
            60%  { background: var(--color-warning); }
            100% { width: 0%;   background: var(--color-error); }
        }

        /* ── 상단 UI ── */
        #top-ui {
            position: absolute;
            top: 1.8vw; left: 2.5vw; right: 2.5vw;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: var(--z-raised);
        }

        .left-ui-group, .right-ui-group {
            display: flex;
            align-items: center;
            gap: 1.2vw;
        }

        #life-box {
            font-size: 2.8vw;
            letter-spacing: 0.4vw;
            filter: drop-shadow(0 2px 4px rgba(229,57,53,0.3));
        }

        #score-box {
            font-family: var(--font-sans);
            font-size: 2vw;
            font-weight: 900;
            color: var(--color-primary-text);
            background: var(--color-primary-tint);
            border: 1.5px solid var(--blue-200);
            padding: 0.4vw 1.2vw;
            border-radius: var(--radius-full);
            letter-spacing: -0.01em;
        }

        #combo-box {
            font-family: var(--font-sans);
            font-size: 3vw;
            font-weight: 900;
            color: var(--orange-400);
            text-shadow: 0 2px 0 var(--neutral-800);
            opacity: 0;
            transition: opacity var(--dur-base) var(--ease-out);
        }

        /* ── 홈 버튼 ── */
        .home-btn {
            padding: 0.6vw 1.1vw;
            font-family: var(--font-sans);
            font-size: 1.1vw;
            font-weight: 700;
            color: var(--color-text-on-brand);
            background: var(--neutral-600);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: background var(--dur-fast) var(--ease-out),
                        transform var(--dur-fast) var(--ease-out);
        }

        .home-btn:hover {
            background: var(--neutral-700);
            transform: translateY(-2px);
        }

        /* ── 애니메이션 ── */
        .combo-anim { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes pop {
            0%   { transform: scale(0.5); opacity: 0; }
            50%  { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1);   opacity: 1; }
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px,0,0); }
            20%, 80% { transform: translate3d(2px,0,0);  }
            30%,50%,70% { transform: translate3d(-3px,0,0); }
            40%,60%     { transform: translate3d(3px,0,0);  }
        }

        .pulse { animation: pulse 1s infinite alternate; }

        @keyframes pulse {
            0%   { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        /* ── 인트로 래퍼 ── */
        #intro-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%; height: 100%;
            overflow-y: auto;
            padding: 2vw 0;
        }

        #intro-wrapper::-webkit-scrollbar { width: 6px; }
        #intro-wrapper::-webkit-scrollbar-track { background: transparent; }
        #intro-wrapper::-webkit-scrollbar-thumb { background: var(--neutral-300); border-radius: var(--radius-full); }
        #intro-wrapper::-webkit-scrollbar-thumb:hover { background: var(--neutral-400); }

        /* ── 타이틀 ── */
        #intro-title {
            font-family: var(--font-sans);
            font-size: 3.8vw;
            font-weight: 900;
            color: var(--color-text-primary);
            margin-bottom: 1vw;
            letter-spacing: var(--tracking-tight);
        }

        /* ── 전역 설정 섹션 ── */
        #global-setup-section {
            margin-bottom: 1.2vw;
            background: var(--color-primary-subtle);
            border: 1.5px solid var(--blue-200);
            padding: 0.9vw 1.5vw;
            border-radius: var(--radius-xl);
            width: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1vw;
            flex-wrap: wrap;
        }

        #global-setup-section label {
            font-family: var(--font-sans);
            font-size: 1.3vw;
            font-weight: 700;
            color: var(--color-primary-text);
        }

        #global-setup-section input[type="number"] {
            width: 5vw;
            padding: 0.4vw 0.6vw;
            font-family: var(--font-sans);
            font-size: 1.3vw;
            font-weight: 700;
            text-align: center;
            border: 1.5px solid var(--blue-300);
            border-radius: var(--radius-md);
            color: var(--color-primary-text);
            background: var(--color-surface);
            outline: none;
            transition: border-color var(--dur-fast) var(--ease-out),
                        box-shadow var(--dur-fast) var(--ease-out);
        }

        #global-setup-section input[type="number"]:focus {
            border-color: var(--color-border-focus);
            box-shadow: var(--shadow-focus-ring);
        }

        #generate-sets-btn {
            padding: 0.55vw 1.2vw;
            font-family: var(--font-sans);
            font-size: 1.2vw;
            font-weight: 700;
            color: var(--color-text-on-brand);
            background: var(--orange-400);
            border: none;
            border-radius: var(--radius-lg);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: background var(--dur-fast) var(--ease-out),
                        transform var(--dur-fast) var(--ease-out);
        }

        #generate-sets-btn:hover:not(:disabled) {
            background: var(--orange-500);
            transform: translateY(-2px);
        }

        #generate-sets-btn:disabled {
            background: var(--neutral-400);
            cursor: not-allowed;
        }

        /* ── 조 이름 설정 ── */
        #team-setup-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1vw;
            margin-bottom: 1.5vw;
            width: 90%;
            background: var(--color-surface-subtle);
            padding: 1.2vw;
            border-radius: var(--radius-xl);
            border: 1.5px solid var(--color-border);
        }

        .team-input-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.3vw;
        }

        .team-input-group label {
            font-family: var(--font-sans);
            font-size: 0.95vw;
            font-weight: 700;
            color: var(--color-text-secondary);
            letter-spacing: var(--tracking-wide);
            text-transform: uppercase;
        }

        .team-name-input {
            width: 100%;
            padding: 0.55vw 0.7vw;
            font-family: var(--font-sans);
            font-size: 1.15vw;
            font-weight: 600;
            border: 1.5px solid var(--color-border-strong);
            border-radius: var(--radius-md);
            text-align: center;
            color: var(--color-text-primary);
            background: var(--color-surface);
            transition: border-color var(--dur-fast) var(--ease-out),
                        box-shadow var(--dur-fast) var(--ease-out);
            outline: none;
        }

        .team-name-input:focus {
            border-color: var(--color-border-focus);
            box-shadow: var(--shadow-focus-ring);
        }

        .team-score-display {
            margin-top: 0.2vw;
            font-family: var(--font-sans);
            font-size: 1.3vw;
            font-weight: 900;
            color: var(--color-primary-text);
            width: 100%;
            text-align: center;
            background: var(--color-primary-tint);
            padding: 0.35vw;
            border-radius: var(--radius-md);
            letter-spacing: -0.01em;
        }

        /* ── 세트 버튼 그리드 ── */
        #set-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.9vw;
            width: 85%;
        }

        .set-btn {
            padding: 1vw;
            font-family: var(--font-sans);
            font-size: 1.4vw;
            font-weight: 800;
            border: none;
            border-radius: var(--radius-lg);
            background: var(--color-primary);
            color: var(--color-text-on-brand);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: background var(--dur-fast) var(--ease-out),
                        transform var(--dur-fast) var(--ease-out),
                        box-shadow var(--dur-fast) var(--ease-out);
        }

        .set-btn:hover {
            background: var(--color-primary-hover);
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
        }

        .set-btn:active { transform: translateY(0); }

        /* ── 퀴즈 화면 ── */
        #content-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 85%;
            margin: 0 auto;
        }

        #team-badge {
            font-family: var(--font-sans);
            background: var(--neutral-800);
            color: var(--color-text-on-brand);
            padding: 0.45vw 1.5vw;
            border-radius: var(--radius-full);
            font-size: 1.4vw;
            font-weight: 800;
            margin-bottom: 0.8vw;
            letter-spacing: var(--tracking-wide);
        }

        #question-number {
            font-family: var(--font-sans);
            font-size: 1.6vw;
            color: var(--color-text-secondary);
            font-weight: 700;
            margin-bottom: 0.8vw;
            letter-spacing: var(--tracking-wider);
            text-transform: uppercase;
        }

        #question-text {
            font-family: var(--font-sans);
            font-size: 4vw;
            font-weight: 900;
            color: var(--color-text-primary);
            word-break: keep-all;
            line-height: var(--leading-tight);
            margin-bottom: 2vw;
            min-height: 12vw;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: var(--tracking-tight);
        }

        #answer-section {
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 12vw;
        }

        #answer-section.show { visibility: visible; }

        #answer-text {
            font-family: var(--font-sans);
            font-size: 7.5vw;
            font-weight: 900;
            margin-bottom: 0.6vw;
            letter-spacing: var(--tracking-tight);
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
        }

        #explanation-text {
            font-family: var(--font-sans);
            font-size: 1.8vw;
            color: var(--color-text-secondary);
            background: var(--color-surface-subtle);
            border: 1px solid var(--color-border);
            padding: 0.7vw 2vw;
            border-radius: var(--radius-lg);
            word-break: keep-all;
        }

        /* ── 하단 안내 ── */
        #footer-guide {
            position: absolute;
            bottom: 1.2vw;
            font-family: var(--font-sans);
            font-size: 1vw;
            color: var(--color-text-secondary);
            background: rgba(255,255,255,0.9);
            border: 1px solid var(--color-border);
            padding: 0.45vw 1vw;
            border-radius: var(--radius-full);
            backdrop-filter: blur(8px);
        }

        .control-key {
            font-weight: 800;
            color: var(--color-primary);
        }

        .danger-key {
            font-weight: 800;
            color: var(--color-error);
        }

        /* ── 준비 화면 ── */
        #preparation-screen {
            background: var(--neutral-50);
        }

        #prep-team-name {
            font-family: var(--font-sans);
            background: var(--neutral-800);
            color: #fff;
            padding: 0.5vw 2vw;
            border-radius: var(--radius-full);
            font-size: 2vw;
            font-weight: 800;
            margin-bottom: 1.5vw;
            letter-spacing: var(--tracking-wide);
        }

        #prep-set-name {
            font-family: var(--font-sans);
            font-size: 4vw;
            font-weight: 900;
            color: var(--color-primary);
            margin-bottom: 0.8vw;
            letter-spacing: var(--tracking-tight);
        }

        .prep-ready-text {
            font-family: var(--font-sans);
            font-size: 2.8vw;
            font-weight: 900;
            color: var(--color-text-primary);
            margin-bottom: 2.5vw;
            letter-spacing: var(--tracking-tight);
        }

        .prep-start-hint {
            font-family: var(--font-sans);
            font-size: 1.4vw;
            color: var(--color-error-text);
            background: var(--color-error-subtle);
            border: 1.5px solid var(--red-200);
            padding: 0.9vw 2vw;
            border-radius: var(--radius-lg);
            font-weight: 700;
            cursor: pointer;
        }

        /* ── 결과 화면 ── */
        #result-screen {
            background: var(--neutral-50);
        }

        #result-emoji {
            font-size: 7vw;
            margin-bottom: 0.8vw;
            animation: pop 0.5s ease-out;
        }

        #result-title {
            font-family: var(--font-sans);
            font-size: 4.5vw;
            font-weight: 900;
            margin-bottom: 0.8vw;
            letter-spacing: var(--tracking-tight);
        }

        #result-score-title {
            font-family: var(--font-sans);
            font-size: 1.8vw;
            color: var(--color-text-secondary);
            margin-bottom: 0.4vw;
            font-weight: 600;
        }

        #result-score {
            font-family: var(--font-sans);
            font-size: 11vw;
            font-weight: 900;
            margin-bottom: 2.5vw;
            letter-spacing: var(--tracking-tight);
        }

        .result-back-hint {
            font-family: var(--font-sans);
            font-size: 1.4vw;
            color: var(--color-text-on-brand);
            background: var(--color-primary);
            padding: 1vw 2.5vw;
            border-radius: var(--radius-full);
            font-weight: 700;
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: background var(--dur-fast) var(--ease-out),
                        transform var(--dur-fast) var(--ease-out);
        }

        .result-back-hint:hover {
            background: var(--color-primary-hover);
            transform: translateY(-2px);
        }

        /* ── 피드백 오버레이 ── */
        #feedback-overlay {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(8px);
        }

        #feedback-text {
            font-family: var(--font-sans);
            font-size: 14vw;
            font-weight: 900;
            letter-spacing: var(--tracking-tight);
        }
    </style>
    <!-- CSV 파싱을 위한 PapaParse 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>

<body>

    <div id="slide-container">
        <div id="timer-bar-container">
            <div id="timer-bar"></div>
        </div>

        <div id="top-ui">
            <div class="left-ui-group">
                <div id="life-box">❤️❤️❤️</div>
                <div id="score-box">0 점</div>
            </div>
            <div class="right-ui-group">
                <div id="combo-box">0 COMBO!</div>
                <button class="home-btn" onclick="returnToIntro()" title="메인 화면으로 돌아가기">🏠 홈으로</button>
            </div>
        </div>

        <div id="intro-wrapper">
            <div style="width: 90%; display: flex; justify-content: flex-end; margin-bottom: -0.5vw; z-index: 50;">
                <button onclick="window.open('guide.html', '_blank')" title="클릭하면 게임 설명과 매뉴얼이 새 탭에서 열립니다."
                    style="padding: 0.6vw 1.1vw; font-family: var(--font-sans); font-size: 1.1vw; font-weight: 700; color: #fff; background: var(--color-success); border: none; border-radius: var(--radius-lg); cursor: pointer; box-shadow: var(--shadow-md); transition: background 0.15s, transform 0.15s;"
                    onmouseover="this.style.background='var(--green-600)'; this.style.transform='translateY(-2px)'"
                    onmouseout="this.style.background='var(--color-success)'; this.style.transform='none'">
                    📖 게임 설명
                </button>
            </div>
            <h1 id="intro-title" style="margin-top: 1vw;">🗣️ 사구동성! 경제활동 퀴즈</h1>

            <div id="global-setup-section">
                <label>⏱️ 타이머(초)</label>
                <input type="number" id="timer-setting" value="4" min="1" max="60">
                <span style="font-size: 1.5vw; color: var(--color-border-strong);">|</span>
                <label>📝 세트 수</label>
                <input type="number" id="set-count-setting" value="8" min="1" max="20">
                <label>문항 수</label>
                <input type="number" id="q-per-set-setting" value="10" min="1" max="50">
                <button id="generate-sets-btn" onclick="generateRandomSets()" disabled>데이터 로드 중...</button>
            </div>

            <div id="team-setup-section">
            </div>

            <div id="set-container">
            </div>
        </div>

        <div id="preparation-screen"
            style="display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; z-index: 20; position: absolute;"
            onclick="startQuizFromPrep()">
            <button class="home-btn" style="position: absolute; top: 2vw; right: 3vw;"
                onclick="event.stopPropagation(); returnToIntro()">🏠 홈으로</button>
            <div id="prep-team-name">조 이름</div>
            <div id="prep-set-name">세트 1</div>
            <div class="prep-ready-text">준비되셨나요?</div>
            <div class="prep-start-hint pulse">스페이스바(Enter)를 누르거나 화면을 클릭하여 시작하세요!</div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen"
            style="display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; z-index: 30; position: absolute;"
            onclick="closeResultScreen()">
            <div id="result-emoji">🏆</div>
            <div id="result-title">세트 클리어!</div>
            <div id="result-score-title">최종 획득 점수</div>
            <div id="result-score">0 점</div>
            <div class="result-back-hint pulse">화면을 클릭하거나 Enter를 눌러 메인으로 돌아가기</div>
        </div>

        <!-- 정답/오답 피드백 오버레이 -->
        <div id="feedback-overlay"
            style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 25; flex-direction: column; align-items: center; justify-content: center;">
            <div id="feedback-text"></div>
        </div>

        <div id="content-wrapper">
            <div id="team-badge">조 이름</div>
            <div id="question-number">세트 1 - 문제 1 / 10</div>
            <div id="question-text">여기에 문제가 표시됩니다.</div>

            <div id="answer-section">
                <div id="answer-text">정답</div>
                <div id="explanation-text">여기에 해설이 표시됩니다.</div>
            </div>
        </div>

        <div id="footer-guide">
            [이전 문제]: <span class="control-key">← (좌방향키)</span> &nbsp;|&nbsp;
            [정답 확인]: <span class="control-key">Enter / Space</span> &nbsp;|&nbsp;
            [정답 처리(콤보 UP)]: <span class="control-key">O 키</span> &nbsp;|&nbsp;
            [오답 처리(라이프 DOWN)]: <span class="danger-key">X 키</span>
        </div>
    </div>

    <script>
        let masterQuestionPool = []; // CSV에서 한 번 로드될 전체 문항 풀
        let allQuizData = []; // 랜덤 분배되어 게임에 사용될 배열

        let currentSetIndex = 0;
        let currentQuizData = [];
        let currentIndex = 0;
        let isAnswerShown = false;
        let lives = 3;
        let combo = 0;
        let currentScore = 0;
        let teamNames = [];
        let teamScores = [0, 0, 0, 0, 0, 0, 0, 0];
        let historyStack = [];
        let gameOverTimeout = null;
        let isPreparing = false;
        let userTimerDuration = 4;

        const introWrapperEl = document.getElementById('intro-wrapper');
        const teamSetupSectionEl = document.getElementById('team-setup-section');
        const contentWrapperEl = document.getElementById('content-wrapper');
        const topUiEl = document.getElementById('top-ui');
        const setContainerEl = document.getElementById('set-container');
        const slideContainerEl = document.getElementById('slide-container');
        const timerBarContainerEl = document.getElementById('timer-bar-container');
        const timerBarEl = document.getElementById('timer-bar');
        const lifeBoxEl = document.getElementById('life-box');
        const scoreBoxEl = document.getElementById('score-box');
        const comboBoxEl = document.getElementById('combo-box');
        const teamBadgeEl = document.getElementById('team-badge');
        const questionNumEl = document.getElementById('question-number');
        const questionTextEl = document.getElementById('question-text');
        const answerSectionEl = document.getElementById('answer-section');
        const answerTextEl = document.getElementById('answer-text');
        const explanationTextEl = document.getElementById('explanation-text');

        // 페이지 로드 시 데이터 로딩 시작
        window.addEventListener('DOMContentLoaded', loadQuizDataFromCSV);

        // CSV 데이터 로드 및 초기 설정
        function loadQuizDataFromCSV() {
            const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRM5I-HyhySLvW872odd55EEdBpfgfhmyfD1wNVfZ6A6ovx2mrNEWe5D9jFhPO_gEKkwMYpmeNHRmOd/pub?gid=0&single=true&output=csv';

            const genBtn = document.getElementById('generate-sets-btn');
            setContainerEl.innerHTML = '<div id="loading-msg" style="grid-column: 1 / -1; font-size: 2vw; font-weight: 800; color: var(--color-primary); text-align: center; padding: 2vw; font-family: var(--font-sans);">⏳ 문항 데이터를 불러오는 중입니다...</div>';

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                complete: function (results) {
                    masterQuestionPool = [];

                    results.data.forEach(row => {
                        if (!row['질문 내용'] || !row['정답']) return; // 빈 행 무시
                        masterQuestionPool.push({
                            q: row['질문 내용'],
                            a: row['정답'],
                            exp: row['해설'] || '',
                            type: row['정답'] // 정답값(생산/분배/소비)을 유형으로 사용
                        });
                    });

                    document.getElementById('loading-msg').style.display = 'none';

                    genBtn.textContent = '랜덤 세트 구성하기';
                    genBtn.style.backgroundColor = 'var(--orange-400)';
                    genBtn.style.cursor = 'pointer';
                    genBtn.disabled = false;
                },
                error: function (error) {
                    console.error("데이터 로딩 실패:", error);
                    setContainerEl.innerHTML = '<div style="grid-column: 1 / -1; font-size: 2vw; font-weight: 800; color: var(--color-error); text-align: center; padding: 2vw; font-family: var(--font-sans);">⚠️ 데이터 로딩에 실패했습니다. 사이트를 새로고침 해주세요.</div>';
                }
            });
        }

        /**
         * [방법 2] 조건부 구성(Constructive) 셔플:
         * 남은 풀에서 하나씩 뽑되, 직전 2개가 같은 유형이면 그 유형을 제외하고 뽑음.
         * 막다른 길(후보 없음)에 빠지면 재시도. 100회 초과 시 단순 슬라이싱으로 폴백.
         */
        function constrainedShuffle(pool, count) {
            const MAX_ATTEMPTS = 100;
            for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
                // 1단계: 풀 자체를 Fisher-Yates로 랜덤하게 섞음
                let remaining = [...pool];
                for (let i = remaining.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
                }

                // 2단계: 조건부로 하나씩 뽑아서 결과 배열 구성
                const result = [];
                let deadEnd = false;

                while (result.length < count) {
                    // 직전 2개가 같은 유형이면 그 유형은 제한
                    let restrictedType = null;
                    const len = result.length;
                    if (len >= 2 && result[len - 1].type === result[len - 2].type) {
                        restrictedType = result[len - 1].type;
                    }

                    // 제한 유형을 제외한 후보군
                    const candidates = remaining.filter(q => q.type !== restrictedType);

                    if (candidates.length === 0) {
                        deadEnd = true; // 막다른 길 → 재시도
                        break;
                    }

                    // 후보군 중 랜덤 선택
                    const pick = candidates[Math.floor(Math.random() * candidates.length)];
                    result.push(pick);
                    remaining.splice(remaining.indexOf(pick), 1);
                }

                if (!deadEnd) return result; // 성공 시 반환
            }

            // 100회 실패 시 경고 후 단순 슬라이싱 폴백
            console.warn('[constrainedShuffle] 100회 시도 실패. 제약 없이 반환합니다. 특정 유형이 너무 많은지 확인하세요.');
            const fallback = [...pool];
            for (let i = fallback.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [fallback[i], fallback[j]] = [fallback[j], fallback[i]];
            }
            return fallback.slice(0, count);
        }

        // 전체 문항 풀에서 무작위 세트 생성
        function generateRandomSets() {
            const numOfSetsInput = parseInt(document.getElementById('set-count-setting').value);
            const qPerSetInput = parseInt(document.getElementById('q-per-set-setting').value);

            if (isNaN(numOfSetsInput) || numOfSetsInput < 1) return alert('세트 수를 올바르게 입력하세요.');
            if (isNaN(qPerSetInput) || qPerSetInput < 1) return alert('문항 수를 올바르게 입력하세요.');

            const totalNeeded = numOfSetsInput * qPerSetInput;
            const totalAvailable = masterQuestionPool.length;

            if (totalNeeded > totalAvailable) {
                alert(`전체 준비된 문항 수(${totalAvailable}개)보다 요구하는 문항 수(${totalNeeded}개)가 많습니다.\n세트 수나 세트당 문항 수를 줄여주세요.`);
                return;
            }

            // 전체 풀을 먼저 Fisher-Yates로 1차 셔플
            let globalPool = [...masterQuestionPool];
            for (let i = globalPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [globalPool[i], globalPool[j]] = [globalPool[j], globalPool[i]];
            }

            // 각 세트별로 constrainedShuffle을 적용하여 중복 없이 뽑기
            allQuizData = [];
            let usedPool = globalPool; // 남은 풀 추적

            for (let i = 0; i < numOfSetsInput; i++) {
                const setArr = constrainedShuffle(usedPool, qPerSetInput);
                allQuizData.push(setArr);
                // 이미 뽑힌 문항을 풀에서 제거
                const pickedSet = new Set(setArr);
                usedPool = usedPool.filter(q => !pickedSet.has(q));
            }

            // 설정 완료 후 UI 생성
            initUI(numOfSetsInput);

            // 생성 버튼 피드백
            const genBtn = document.getElementById('generate-sets-btn');
            genBtn.textContent = '생성 완료!';
            genBtn.style.backgroundColor = 'var(--color-success)';
            setTimeout(() => {
                genBtn.textContent = '랜덤 세트 다시 구성하기';
                genBtn.style.backgroundColor = 'var(--orange-400)';
            }, 1500);
        }

        function initUI(numOfSets) {
            teamSetupSectionEl.innerHTML = '';
            setContainerEl.innerHTML = '';

            for (let i = 1; i <= numOfSets; i++) {
                const group = document.createElement('div');
                group.className = 'team-input-group';
                group.innerHTML = `
                    <label>${i}조 이름</label>
                    <input type="text" class="team-name-input" id="team-in-${i}" placeholder="${i}조">
                    <div class="team-score-display" id="team-score-${i}">0 점</div>
                `;
                teamSetupSectionEl.appendChild(group);

                const btn = document.createElement('button');
                btn.className = 'set-btn';
                btn.textContent = `세트 ${i} 시작`;
                btn.onclick = () => startGame(i - 1);
                setContainerEl.appendChild(btn);
            }

            teamScores = Array(numOfSets).fill(0);
        }

        // 게임 시작 로직
        function startGame(setIndex) {
            teamNames = [];
            for (let i = 1; i <= allQuizData.length; i++) {
                const val = document.getElementById(`team-in-${i}`).value.trim();
                teamNames.push(val || `${i}조`);
            }

            userTimerDuration = parseInt(document.getElementById('timer-setting').value) || 4;

            currentSetIndex = setIndex;
            currentQuizData = allQuizData[setIndex];
            currentIndex = 0;
            lives = 3;
            combo = 0;
            currentScore = 0; // 시작 시 현재 진행 중인 게임 점수 초기화
            isAnswerShown = false;
            historyStack = [];
            isPreparing = true;
            if (gameOverTimeout) clearTimeout(gameOverTimeout);

            updateLivesDisplay();
            updateComboDisplay(false);
            updateScoreDisplay();

            introWrapperEl.style.display = 'none';

            // 준비 화면 표시
            const prepScreenEl = document.getElementById('preparation-screen');
            document.getElementById('prep-team-name').textContent = teamNames[currentSetIndex];
            document.getElementById('prep-set-name').textContent = `세트 ${currentSetIndex + 1}`;
            prepScreenEl.style.display = 'flex';
        }

        function startQuizFromPrep() {
            if (!isPreparing) return;
            isPreparing = false;
            document.getElementById('preparation-screen').style.display = 'none';

            contentWrapperEl.style.display = 'flex';
            topUiEl.style.display = 'flex';
            timerBarContainerEl.style.display = 'block';

            updateSlide();
        }

        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < 3; i++) hearts += (i < lives) ? '❤️' : '🖤';
            lifeBoxEl.textContent = hearts;
        }

        function updateScoreDisplay() {
            scoreBoxEl.textContent = `${currentScore} 점`;
        }

        function updateComboDisplay(animate) {
            if (combo > 1) {
                comboBoxEl.textContent = `${combo} COMBO!`;
                comboBoxEl.style.opacity = 1;
                if (animate) {
                    comboBoxEl.classList.remove('combo-anim');
                    void comboBoxEl.offsetWidth;
                    comboBoxEl.classList.add('combo-anim');
                }
            } else { comboBoxEl.style.opacity = 0; }
        }

        function resetTimer() {
            timerBarEl.classList.remove('run-timer');
            void timerBarEl.offsetWidth;
            timerBarEl.style.animationDuration = userTimerDuration + 's';
            timerBarEl.classList.add('run-timer');
        }

        function triggerShake() {
            slideContainerEl.classList.remove('shake');
            void slideContainerEl.offsetWidth;
            slideContainerEl.classList.add('shake');
        }

        function updateSlide() {
            const data = currentQuizData[currentIndex];
            const currentTeam = teamNames[currentSetIndex];

            teamBadgeEl.textContent = currentTeam;
            questionNumEl.textContent = `세트 ${currentSetIndex + 1} - 문제 ${currentIndex + 1} / ${currentQuizData.length}`;
            questionTextEl.textContent = data.q;
            answerTextEl.textContent = data.a;
            explanationTextEl.textContent = data.exp;

            if (data.a === "생산") answerTextEl.style.color = 'var(--color-primary)';
            else if (data.a === "분배") answerTextEl.style.color = 'var(--color-success)';
            else if (data.a === "소비") answerTextEl.style.color = 'var(--color-error)';

            if (isAnswerShown) {
                answerSectionEl.classList.add('show');
                timerBarEl.style.animationPlayState = 'paused';
            } else {
                answerSectionEl.classList.remove('show');
                timerBarEl.style.animationPlayState = 'running';
                resetTimer();
            }
        }

        function showAnswerAction() {
            if (!isAnswerShown) { isAnswerShown = true; updateSlide(); }
        }

        // 정답 처리 (O키)
        function handleCorrect() {
            if (!isAnswerShown) return; // 정답을 확인하기 전에는 처리 불가
            if (typeof isFeedbackShowing !== 'undefined' && isFeedbackShowing) return;

            historyStack.push({ index: currentIndex, lives: lives, combo: combo, score: currentScore });
            combo++;
            currentScore += 100 + (combo * 5); // 기본 100점 + 콤보당 5점 추가 보너스
            teamScores[currentSetIndex] = currentScore; // 글로벌 조별 점수판에도 현재 점수 저장

            updateScoreDisplay();
            updateComboDisplay(true);

            if (combo >= 3) triggerShake();

            triggerFeedback(true, () => {
                moveToNextQuestion();
            });
        }

        let isResultScreenShowing = false;
        let isFeedbackShowing = false;

        function triggerFeedback(isCorrect, callback) {
            isFeedbackShowing = true;
            const overlay = document.getElementById('feedback-overlay');
            const feedbackText = document.getElementById('feedback-text');

            if (isCorrect) {
                feedbackText.textContent = '⭕ 정답!';
                feedbackText.style.color = 'var(--color-primary)';
            } else {
                feedbackText.textContent = '❌ 오답...';
                feedbackText.style.color = 'var(--color-error)';
            }

            overlay.style.display = 'flex';

            // 텍스트 팝 애니메이션 리셋
            feedbackText.classList.remove('combo-anim');
            void feedbackText.offsetWidth;
            feedbackText.classList.add('combo-anim');

            setTimeout(() => {
                overlay.style.display = 'none';
                isFeedbackShowing = false;
                if (callback) callback();
            }, 800); // 0.8초 후 사라지고 다음 동작 수행
        }

        function showResultScreen(isClear) {
            isResultScreenShowing = true;
            const resultScreenEl = document.getElementById('result-screen');
            const emojiEl = document.getElementById('result-emoji');
            const titleEl = document.getElementById('result-title');
            const scoreEl = document.getElementById('result-score');

            if (isClear) {
                emojiEl.textContent = '🏆';
                titleEl.textContent = `[${teamNames[currentSetIndex]}] 세트 클리어!`;
                titleEl.style.color = 'var(--color-primary)';
                scoreEl.style.color = 'var(--color-primary)';
            } else {
                emojiEl.textContent = '💀';
                titleEl.textContent = `[${teamNames[currentSetIndex]}] 게임 오버...`;
                titleEl.style.color = 'var(--color-error)';
                scoreEl.style.color = 'var(--color-error)';
            }
            scoreEl.textContent = `${currentScore} 점`;

            resultScreenEl.style.display = 'flex';
        }

        function closeResultScreen() {
            if (!isResultScreenShowing) return;
            isResultScreenShowing = false;
            document.getElementById('result-screen').style.display = 'none';
            returnToIntro();
        }

        // 오답 처리 (X키)
        function handleWrong() {
            if (!isAnswerShown) return; // 정답을 확인하기 전에는 처리 불가
            if (lives <= 0 || (typeof isFeedbackShowing !== 'undefined' && isFeedbackShowing)) return;

            historyStack.push({ index: currentIndex, lives: lives, combo: combo, score: currentScore });
            combo = 0;
            lives--;
            updateComboDisplay(false);
            updateLivesDisplay();

            slideContainerEl.style.backgroundColor = 'var(--color-error-subtle)';
            setTimeout(() => { slideContainerEl.style.backgroundColor = 'var(--color-surface)'; }, 200);

            triggerFeedback(false, () => {
                if (lives <= 0) {
                    showResultScreen(false);
                } else {
                    moveToNextQuestion();
                }
            });
        }

        function moveToNextQuestion() {
            if (currentIndex < currentQuizData.length - 1) {
                currentIndex++;
                isAnswerShown = false;
                updateSlide();
            } else {
                showResultScreen(true);
            }
        }

        // 초기 화면으로 복귀하는 기능 (홈버튼과 게임오버 시 작동)
        function returnToIntro() {
            // 1. 현재 8개 조 중 최고 점수 찾기
            const maxScore = Math.max(...teamScores);

            // 2. 메인 화면으로 돌아갈 때, 점수판 업데이트 및 왕관 표시
            for (let i = 1; i <= teamScores.length; i++) {
                const scoreDisplayEl = document.getElementById(`team-score-${i}`);
                if (scoreDisplayEl) {
                    const score = teamScores[i - 1];
                    let textContent = `${score} 점`;

                    // 기본 색상(파란색) 및 배경 리셋
                    scoreDisplayEl.style.color = 'var(--color-primary)';
                    scoreDisplayEl.style.background = 'var(--color-primary-tint)';

                    // 플레이 기록이 있는 경우(0점 초과)
                    if (score > 0) {
                        // 800점 이하는 붉은색 폰트 및 붉은색 배경 음영 처리
                        if (score <= 800) {
                            scoreDisplayEl.style.color = 'var(--color-error-text)';
                            scoreDisplayEl.style.background = 'var(--color-error-subtle)';
                        }

                        // 500점 이하는 해골 마크, 최고 점수는 왕관 마크
                        if (score <= 500) {
                            textContent = `💀 ${score} 점`;
                        } else if (score === maxScore) {
                            textContent = `👑 ${score} 점`;
                        }
                    }

                    scoreDisplayEl.textContent = textContent;
                }
            }

            document.getElementById('preparation-screen').style.display = 'none';
            isPreparing = false;
            contentWrapperEl.style.display = 'none';
            topUiEl.style.display = 'none';
            timerBarContainerEl.style.display = 'none';
            introWrapperEl.style.display = 'flex';
        }
        function goToPreviousQuestion() {
            if (historyStack.length > 0) {
                if (typeof isResultScreenShowing !== 'undefined' && isResultScreenShowing) {
                    isResultScreenShowing = false;
                    document.getElementById('result-screen').style.display = 'none';
                }

                if (gameOverTimeout) {
                    clearTimeout(gameOverTimeout);
                    gameOverTimeout = null;
                }

                const prevState = historyStack.pop();
                currentIndex = prevState.index;
                lives = prevState.lives;
                combo = prevState.combo;
                currentScore = prevState.score;

                updateLivesDisplay();
                updateComboDisplay(false);
                updateScoreDisplay();
                teamScores[currentSetIndex] = currentScore;

                isAnswerShown = false;
                updateSlide();
            }
        }

        // 키보드 인식 이벤트
        window.addEventListener('keydown', (e) => {
            if (introWrapperEl.style.display !== 'none') return;
            if (typeof isFeedbackShowing !== 'undefined' && isFeedbackShowing) return; // 피드백 연출 중에는 모든 단축키 무시

            const code = e.code;
            const key = e.key.toLowerCase();

            if (typeof isResultScreenShowing !== 'undefined' && isResultScreenShowing) {
                if (code === 'Enter' || code === 'Space' || key === ' ') {
                    e.preventDefault();
                    closeResultScreen();
                }
                return;
            }

            if (isPreparing) {
                if (code === 'Enter' || code === 'Space' || key === ' ') {
                    e.preventDefault();
                    startQuizFromPrep();
                }
                return;
            }

            if (code === 'Enter' || code === 'Space' || key === ' ') {
                e.preventDefault();
                showAnswerAction();
            }
            else if (code === 'KeyO' || key === 'o' || key === 'ㅐ') {
                e.preventDefault();
                handleCorrect();
            }
            else if (code === 'KeyX' || key === 'x' || key === 'ㅌ') {
                e.preventDefault();
                handleWrong();
            }
            else if (code === 'Backspace' || code === 'ArrowLeft') {
                e.preventDefault();
                goToPreviousQuestion();
            }
        });    
    </script>
</body>
